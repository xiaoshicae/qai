name: 🎯 Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'QAI v__VERSION__'
          releaseBody: |
            ## Installation

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `.dmg` aarch64 | Right-click → Open on first launch |
            | macOS (Intel) | `.dmg` x64 | Right-click → Open on first launch |
            | Windows | `.msi` | Click "More info" → "Run anyway" if SmartScreen appears |
            | Linux | `.AppImage` | `chmod +x` before running |

            > **macOS users**: The app is not code-signed. On first open, macOS will block it. Right-click the app → "Open" → confirm. You only need to do this once. Alternatively, run `xattr -cr /Applications/QAI.app` in Terminal.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
